<!DOCTYPE html>
<html>
<head>
<title>Edit Event</title>
</head>

<body>

<h2>Edit Event</h2>

<form method="POST">
    {% csrf_token %}

    <input type="text" name="title" value="{{ event.title }}" required><br><br>

    <input type="date" name="date" value="{{ event.date|date:'Y-m-d' }}" required><br><br>

    <button type="submit">Update Event</button>
</form>

<br>
<a href="{% url 'home' %}">Back</a>

</body>
</html>
