{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card page-card">
      <div class="card-body p-4">
        <h2 class="mb-3">{{ title|default:"Confirm delete" }}</h2>
        <p class="text-muted">{{ message|default:"This action cannot be undone." }}</p>
        <form method="post">
          {% csrf_token %}
          <button class="btn btn-danger">Delete</button>
          <a class="btn btn-outline-secondary" href="{{ back_url }}">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
