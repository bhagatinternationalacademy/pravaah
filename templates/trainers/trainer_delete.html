{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
  <h2>Delete Trainer</h2>
  <p>Are you sure you want to delete {{ trainer }}?</p>
  <form method="post">{% csrf_token %}
    <button class="btn btn-danger">Confirm Delete</button>
    <a class="btn btn-secondary" href="{% url 'trainers:list' %}">Cancel</a>
  </form>
</div>
{% endblock %}
