{% extends "base.html" %}
{% block title %}Delete Student{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card page-card">
      <div class="card-body p-4">
        <div class="text-uppercase small fw-semibold text-muted mb-2">Students</div>
        <h2 class="mb-2">{{ title|default:"Delete Student" }}</h2>
        <p class="text-muted mb-4">Delete <strong>{{ object.full_name }}</strong>? This removes the student record from the system.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2">
            <button class="btn btn-danger" type="submit">Delete</button>
            <a class="btn btn-outline-secondary" href="{{ back_url }}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
