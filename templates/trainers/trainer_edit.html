{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container mt-4">
  <h2>Edit Trainer</h2>
  <div class="row">
    <div class="col-md-4">
      {% if trainer.profile_photo %}
      <img src="{{ trainer.profile_photo.url }}" class="img-fluid rounded">
      {% else %}
      <div class="border p-4">No photo</div>
      {% endif %}
    </div>
    <div class="col-md-8">
      <form method="post" enctype="multipart/form-data">{% csrf_token %}
        {{ form|crispy }}
        <div class="mt-3"><button class="btn btn-primary">Save</button></div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
